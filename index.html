<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Homework • flow</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Toast notification container -->
  <div class="toast-container" id="toastContainer"></div>

  <div class="container">
    <!-- header -->
    <header class="header">
      <div class="header-top">
        <div class="logo-group">
          <div class="logo-mark">
            <i class="fas fa-graduation-cap"></i>
          </div>
          <div>
            <h1 class="logo">Homework</h1>
            <p class="logo-subtitle" id="greetingSubtitle">Stay on top of it.</p>
          </div>
        </div>
        <div class="header-actions">
          <div class="date-display" id="currentDate"></div>
          <button class="theme-btn" id="themeToggle" aria-label="Toggle theme">
            <i class="fas fa-moon"></i>
          </button>
        </div>
      </div>
      
      <!-- progress section with ring -->
      <div class="progress-section" id="progressSection">
        <div class="progress-ring-container">
          <svg class="progress-ring" viewBox="0 0 100 100">
            <circle class="progress-ring-bg" cx="50" cy="50" r="42"></circle>
            <circle class="progress-ring-fill" id="progressRing" cx="50" cy="50" r="42"></circle>
          </svg>
          <div class="progress-ring-text">
            <span class="progress-percent" id="progressPercent">0%</span>
            <span class="progress-label">complete</span>
          </div>
        </div>
        <div class="progress-details">
          <div class="progress-stat">
            <span class="stat-number" id="completedCount">0</span>
            <span class="stat-label">Done</span>
          </div>
          <div class="progress-divider"></div>
          <div class="progress-stat">
            <span class="stat-number" id="totalCount">0</span>
            <span class="stat-label">Total</span>
          </div>
          <div class="progress-divider"></div>
          <div class="progress-stat">
            <span class="stat-number" id="streakCount">0</span>
            <span class="stat-label">Streak</span>
          </div>
          <div class="progress-divider"></div>
          <div class="progress-stat">
            <span class="stat-number" id="overdueCount">0</span>
            <span class="stat-label" style="color: var(--red)">Overdue</span>
          </div>
        </div>
      </div>

      <!-- smart suggestion -->
      <div class="smart-suggestion" id="smartSuggestion" style="display: none;">
        <i class="fas fa-lightbulb"></i>
        <span id="suggestionText"></span>
        <button class="suggestion-action" id="suggestionAction">Add</button>
      </div>
    </header>

    <!-- quick add form -->
    <section class="add-section">
      <form id="assignmentForm" autocomplete="off">
        <div class="form-row-top">
          <div class="field field-title">
            <input type="text" id="titleInput" placeholder="Assignment title..." required>
          </div>
          <button type="submit" class="btn-add-circle" aria-label="Add assignment">
            <i class="fas fa-plus"></i>
          </button>
        </div>
        <div class="form-row-bottom">
          <div class="field">
            <input type="text" id="subjectInput" placeholder="Subject" list="subjectSuggestions" required>
            <datalist id="subjectSuggestions"></datalist>
          </div>
          <div class="field">
            <input type="date" id="dueDateInput" required>
          </div>
          <div class="field">
            <select id="prioritySelect">
              <option value="normal">Normal</option>
              <option value="urgent">Urgent</option>
              <option value="low">Low</option>
            </select>
          </div>
        </div>
      </form>
    </section>

    <!-- filters, search & sort -->
    <div class="controls-section">
      <div class="filter-scroll">
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="today">Today</button>
        <button class="filter-chip" data-filter="upcoming">Upcoming</button>
        <button class="filter-chip" data-filter="overdue">Overdue</button>
        <button class="filter-chip" data-filter="dashboard" id="dashboardTab">
          <i class="fas fa-chart-pie"></i> Dashboard
        </button>
      </div>
      <div class="search-sort-row">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search...">
        </div>
        <button class="sort-btn" id="sortBtn" title="Sort">
          <i class="fas fa-arrow-down-a-z"></i>
        </button>
      </div>
    </div>

    <!-- assignments list -->
    <section class="assignments-list" id="assignmentsList"></section>

    <!-- dashboard view (hidden by default) -->
    <section class="dashboard-view" id="dashboardView" style="display: none;">
      <div class="dashboard-grid">
        <div class="dash-card">
          <h3 class="dash-card-title">By Subject</h3>
          <div class="subject-chart" id="subjectChart"></div>
        </div>
        <div class="dash-card">
          <h3 class="dash-card-title">This Week</h3>
          <div class="week-stats" id="weekStats"></div>
        </div>
        <div class="dash-card full-width">
          <h3 class="dash-card-title">Completion Trend</h3>
          <div class="trend-bars" id="trendBars"></div>
        </div>
      </div>
    </section>

    <!-- footer -->
    <div class="footer-action">
      <button class="btn-text" id="clearCompletedBtn">Clear completed</button>
      <span class="footer-dot">·</span>
      <button class="btn-text" id="exportBtn">Export</button>
    </div>

    <!-- detail modal (hidden) -->
    <div class="modal-overlay" id="detailModal" style="display: none;">
      <div class="modal-card">
        <div class="modal-header">
          <h3 id="modalTitle">Assignment Details</h3>
          <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
          <div class="modal-field">
            <label>Title</label>
            <p id="modalAssignmentTitle"></p>
          </div>
          <div class="modal-field">
            <label>Subject</label>
            <p id="modalSubject"></p>
          </div>
          <div class="modal-field">
            <label>Due Date</label>
            <p id="modalDueDate"></p>
          </div>
          <div class="modal-field">
            <label>Priority</label>
            <p id="modalPriority"></p>
          </div>
          <div class="modal-field">
            <label>Notes</label>
            <textarea id="modalNotes" placeholder="Add notes..."></textarea>
          </div>
          <div class="modal-actions">
            <button class="btn-modal btn-delete" id="modalDelete">Delete</button>
            <button class="btn-modal btn-save" id="modalSave">Save Notes</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
