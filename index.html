<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Homework Tracker • flow</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- header -->
    <header class="header">
      <div class="header-top">
        <h1 class="logo">
          <span class="logo-icon"><i class="fas fa-graduation-cap"></i></span>
          homework<span class="logo-dot">.</span>flow
        </h1>
        <div class="header-actions">
          <button class="icon-btn theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <i class="fas fa-moon"></i>
          </button>
          <div class="date-badge" id="currentDate"></div>
        </div>
      </div>
      <div class="progress-section">
        <div class="progress-text">
          <span id="progressLabel">Weekly progress</span>
          <span class="progress-numbers"><span id="completedCount">0</span>/<span id="totalCount">0</span> done</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
        </div>
      </div>
      <!-- streak & motivation -->
      <div class="stats-row" id="statsRow">
        <div class="stat-badge">
          <i class="fas fa-fire"></i>
          <span id="streakCount">0</span> day streak
        </div>
        <div class="stat-badge" id="motivationBadge">
          <i class="fas fa-star"></i>
          <span id="motivationText">Let's get started!</span>
        </div>
      </div>
    </header>

    <!-- add assignment form -->
    <section class="add-section">
      <form id="assignmentForm" autocomplete="off">
        <div class="input-row">
          <div class="field subject-field">
            <label for="subjectInput"><i class="fas fa-book-open"></i> Subject</label>
            <input type="text" id="subjectInput" placeholder="e.g. Math" required>
          </div>
          <div class="field priority-field">
            <label for="prioritySelect"><i class="fas fa-flag"></i> Priority</label>
            <select id="prioritySelect">
              <option value="normal">Normal</option>
              <option value="urgent">Urgent</option>
              <option value="low">Low</option>
            </select>
          </div>
        </div>
        <div class="field title-field">
          <label for="titleInput"><i class="fas fa-pencil-alt"></i> Assignment</label>
          <input type="text" id="titleInput" placeholder="e.g. Problem Set 5" required>
        </div>
        <div class="field date-field">
          <label for="dueDateInput"><i class="fas fa-calendar-alt"></i> Due date</label>
          <input type="date" id="dueDateInput" required>
        </div>
        <button type="submit" class="btn-add">
          <i class="fas fa-plus-circle"></i> Add assignment
        </button>
      </form>
    </section>

    <!-- filter tabs + search -->
    <div class="controls-row">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="today">Today</button>
        <button class="filter-btn" data-filter="upcoming">Upcoming</button>
        <button class="filter-btn" data-filter="overdue">Overdue</button>
      </div>
      <div class="search-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" placeholder="Search..." class="search-input">
      </div>
    </div>

    <!-- assignments list -->
    <section class="assignments-list" id="assignmentsList">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon"><i class="far fa-clipboard"></i></div>
        <p>No assignments yet</p>
        <p class="sub">Add one to get started ✨</p>
      </div>
    </section>

    <!-- clear completed button -->
    <div class="actions-footer">
      <button class="btn-clear" id="clearCompletedBtn">
        <i class="fas fa-check-double"></i> Clear completed
      </button>
    </div>

    <footer class="footer">
      <p>tap to complete • made for focus</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
